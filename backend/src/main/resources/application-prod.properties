# Configuracion de PostgreSQL para produccion (Supabase)
# La DATABASE_URL de Supabase ya incluye username y password
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de JPA/Hibernate para PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Configuracion del servidor
server.port=${PORT:8080}

# Configuracion de Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method

# JWT Configuration
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-ms=86400000

# Configuracion de logging para produccion
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Habilitar referencias circulares
spring.main.allow-circular-references=true
