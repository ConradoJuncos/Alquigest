# Configuracion de PostgreSQL para Supabase
# Prioridad: DATABASE_URL > variables individuales > valores por defecto
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DATABASE_HOST:db.ksutxbemxujpletozsss.supabase.co}:${DATABASE_PORT:6543}/${DATABASE_NAME:postgres}?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:QQahFFn0xK0B1L5H}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de JPA/Hibernate para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Configuracion del servidor
server.port=${PORT:8080}

# Configuracion de Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method

# JWT Configuration - Using a 256-bit secure key
app.jwt-secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnoughToMeetThe256BitRequirementForHMACSHA256Algorithm}
app.jwt-expiration-ms=86400000

# Configuracion de logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.alquileres=INFO

# Habilitar referencias circulares
spring.main.allow-circular-references=true

# Configuracion de HikariCP optimizada para Supabase Pooler
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000
